id: 5a8e2c1f-7d4b-4e9c-b6f3-0c2d4a6e8b0f
name: Off-hours privileged role activation
description: |
  Detects PIM (Privileged Identity Management) role activations recorded in AuditLogs
  that occur outside of configured business hours (default: weekdays 07:00–19:00 UTC)
  or on weekends. Attackers who obtain a PIM-eligible credential prefer to activate
  roles at night or on weekends to minimize SOC visibility.

  The query converts TimeGenerated to a local hour offset for comparison. Off-hours
  is defined as the hour falling outside [BusinessStartHour, BusinessEndHour) on
  a weekday, or any time on Saturday/Sunday.

  NOTE on timezone: the default uses UTC offsets. Adjust UtcOffsetHours for your
  primary business timezone (e.g. -5 for US Eastern, +1 for CET). Follow-the-sun
  orgs with admins in multiple timezones may need to lower the threshold or use a
  per-user timezone attribute from IdentityInfo (UEBA-dependent, not modeled here).

  Accounts on VIPUsers or PrivilegedAccounts watchlists receive an additive RiskScore
  boost. Non-watchlist accounts are still returned (leftouter semantics).

  ATT&CK: T1078.004 — Valid Accounts: Cloud Accounts (Defense Evasion).
  ZT pillar: Use Least Privilege (supporting: Assume Breach).

  STARTING TEMPLATE — review all TUNE: comments before deployment. Not production-ready.
severity: Medium
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AuditLogs
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1078
  - T1078.004
requiresUEBA: false
tuneThresholds:
  BusinessStartHour: 7     # TUNE: start of business hours (UTC, 24h). Default 7 (07:00).
  BusinessEndHour: 19      # TUNE: end of business hours (UTC, 24h). Default 19 (19:00).
  UtcOffsetHours: 0        # TUNE: UTC offset for your primary admin timezone.
                           # e.g. -5 for US Eastern Standard, +1 for CET.
  LookbackWindow: 1d       # TUNE: AuditLogs search window per scheduled run.
  BoostVIP: 10             # TUNE: RiskScore increment for VIPUsers-only accounts.
  BoostPriv: 10            # TUNE: RiskScore increment for PrivilegedAccounts-only accounts.
  BoostBoth: 25            # TUNE: RiskScore increment for accounts on BOTH watchlists.
query: |
  // ── Thresholds — change values here, document reason in docs/tuning-notes.md ──
  let BusinessStartHour  = 7;    // TUNE: inclusive start of business hours (UTC 24h)
  let BusinessEndHour    = 19;   // TUNE: exclusive end of business hours (UTC 24h)
  let UtcOffsetHours     = 0;    // TUNE: UTC offset for primary admin timezone
                                  // TUNE: e.g. -5 for US Eastern Standard, +1 for CET
  let LookbackWindow     = 1d;   // TUNE: search window per scheduled run

  // ── Watchlist lookups ──────────────────────────────────────────────────────
  let VIPList = _GetWatchlist("VIPUsers")
      | project UPN = UserPrincipalName, ObjId = ObjectId, VIPReason;

  let PrivList = _GetWatchlist("PrivilegedAccounts")
      | project UPN = UserPrincipalName, ObjId = ObjectId, AssignedRole, RoleSource;

  // ── Base events: PIM role activation audit entries ─────────────────────────
  // "Add member to role" with a justification/ticket field = PIM activation
  // "Add eligible member to role activated" = direct PIM activation event
  let BaseEvents = AuditLogs
      | where TimeGenerated > ago(LookbackWindow)
      | where OperationName in (
            "Add member to role (PIM activation)",
            "Add eligible member to role",
            "Activate PIM eligible role")
      | mv-expand TargetResources
      | extend TargetUPN    = tostring(TargetResources.userPrincipalName)
      | extend TargetObjId  = tostring(TargetResources.id)
      | extend RoleActivated = tostring(
            TargetResources.modifiedProperties[0].newValue)
      | extend ActorUPN     = tostring(InitiatedBy.user.userPrincipalName)
      | extend ActorIP      = tostring(InitiatedBy.user.ipAddress)
      | where isnotempty(TargetUPN)
      // ── Off-hours filter ────────────────────────────────────────────────────
      | extend LocalHour    = hourofday(TimeGenerated) + UtcOffsetHours
      | extend LocalHour    = iff(LocalHour < 0, LocalHour + 24,
                                  iff(LocalHour >= 24, LocalHour - 24, LocalHour))
      | extend DayOfWeek    = dayofweek(TimeGenerated)
      // dayofweek() returns: 0=Sunday, 1=Monday, ... 6=Saturday
      | extend IsWeekend    = DayOfWeek in (0, 6)
      | extend IsOutsideHours = (LocalHour < BusinessStartHour
                                  or LocalHour >= BusinessEndHour)
      | where IsWeekend or IsOutsideHours
      | project TimeGenerated, TargetUPN, TargetObjId, RoleActivated,
                ActorUPN, ActorIP, OperationName, CorrelationId,
                LocalHour, IsWeekend, IsOutsideHours,
                Result, ResultDescription;

  // ── Apply watchlist joins and RiskScore boost ──────────────────────────────
  BaseEvents
  | join kind=leftouter (VIPList)  on $left.TargetUPN == $right.UPN
  | join kind=leftouter (PrivList) on $left.TargetUPN == $right.UPN
  | extend IsVIP  = isnotempty(VIPReason),
           IsPriv = isnotempty(AssignedRole)
  // TUNABLE: +10 VIP-only, +10 Priv-only, +25 both (iff — not cumulative addition)
  | extend RiskBoost = case(IsVIP and IsPriv, 25, IsVIP or IsPriv, 10, 0)
  | extend RiskScore = RiskBoost
  | extend RiskLabel = case(
      IsVIP and IsPriv, strcat(TargetUPN, " [VIP+PRIV — HIGHEST PRIORITY]"),
      IsVIP,            strcat(TargetUPN, " [VIP]"),
      IsPriv,           strcat(TargetUPN, " [PRIV]"),
      TargetUPN)
  | sort by RiskScore desc, TimeGenerated desc
  | project TimeGenerated, RiskLabel, RiskScore,
            IsVIP, IsPriv, VIPReason, AssignedRole, RoleSource,
            RoleActivated, ActorUPN, ActorIP,
            LocalHour, IsWeekend, IsOutsideHours,
            OperationName, CorrelationId, Result
tags:
  - ZTPillar: LeastPrivilege
  - ZTPillar_Supporting: AssumeBreach
  - MITRETactic: DefenseEvasion
  - MITRETechnique: T1078
  - MITRETechnique: T1078.004
  - DataSource: AuditLogs
  - WatchlistBoost: VIPUsers+PrivilegedAccounts
  - RequiresUEBA: "false"
